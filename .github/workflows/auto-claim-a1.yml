name: Auto-claim A1 Capacity

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      SUPPRESS_LABEL_WARNING: "True"

    steps:
      - name: Check deadline
        run: |
          DEADLINE=1749351300  # 2026-06-08 09:00 Nepal time = 03:15 UTC
          NOW=$(date +%s)
          if [ "$NOW" -gt "$DEADLINE" ]; then
            echo "Deadline reached (9 AM Nepal time). Disabling workflow."
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/leechwr/oracle-friend-arm/actions/workflows/auto-claim-a1.yml/disable"
            exit 0
          fi
          echo "Deadline not reached. Proceeding. ($(date -u))"

      - name: Configure OCI CLI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          pip install oci-cli -q
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          KEY_FILE="$HOME/.oci/key.pem"
          {
            echo "[DEFAULT]"
            echo "user=$OCI_USER_OCID"
            echo "fingerprint=$OCI_FINGERPRINT"
            echo "tenancy=$OCI_TENANCY_OCID"
            echo "region=us-chicago-1"
            echo "key_file=$KEY_FILE"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Skip if instance already running
        id: check
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id "$OCI_TENANCY_OCID" \
            --display-name ankeet-a1 \
            --query "length(data[?\"lifecycle-state\"=='RUNNING'||\"lifecycle-state\"=='PROVISIONING'])" \
            --raw-output 2>/dev/null || echo "0")
          echo "count=${COUNT:-0}" >> $GITHUB_OUTPUT
          if [ "${COUNT:-0}" -gt "0" ]; then
            echo "Instance already running."
          else
            echo "No running instance. Will attempt to claim."
          fi

      - name: Get networking IDs
        if: steps.check.outputs.count == '0'
        id: net
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          C="$OCI_TENANCY_OCID"
          VCN_ID=$(oci network vcn list --compartment-id "$C" \
            --query 'data[0].id' --raw-output 2>/dev/null)
          SUBNET_ID=$(oci network subnet list --compartment-id "$C" \
            --vcn-id "$VCN_ID" --query 'data[0].id' --raw-output 2>/dev/null)
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$C" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape VM.Standard.A1.Flex \
            --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output)
          AD=$(oci iam availability-domain list \
            --compartment-id "$C" \
            --query 'data[0].name' --raw-output)
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "ad=$AD" >> $GITHUB_OUTPUT
          echo "VCN: $VCN_ID | Subnet: $SUBNET_ID | Image: $IMAGE_ID | AD: $AD"

      - name: Attempt to claim A1 instance
        if: steps.check.outputs.count == '0'
        id: launch
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          printf '%s' "$OCI_SSH_PUBLIC_KEY" > /tmp/ssh.pub
          echo "Attempting to launch A1.Flex..."
          RESULT=$(oci compute instance launch \
            --compartment-id "$OCI_TENANCY_OCID" \
            --availability-domain "${{ steps.net.outputs.ad }}" \
            --display-name ankeet-a1 \
            --image-id "${{ steps.net.outputs.image_id }}" \
            --shape VM.Standard.A1.Flex \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --subnet-id "${{ steps.net.outputs.subnet_id }}" \
            --assign-public-ip true \
            --ssh-authorized-keys-file /tmp/ssh.pub \
            --boot-volume-size-in-gbs 200 \
            --query 'data.id' --raw-output 2>&1) || true
          echo "OCI response: $RESULT"
          if echo "$RESULT" | grep -q "Out of host capacity"; then
            echo "No capacity yet. Retry next run."
            exit 0
          elif echo "$RESULT" | grep -q "ocid1.instance"; then
            echo "instance_id=$RESULT" >> $GITHUB_OUTPUT
            echo "SUCCESS: $RESULT"
          else
            echo "Unexpected error — see OCI response above."
            exit 1
          fi

      - name: Wait and verify SSH
        if: steps.launch.outputs.instance_id != ''
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          INSTANCE_ID="${{ steps.launch.outputs.instance_id }}"
          for i in $(seq 1 40); do
            STATE=$(oci compute instance get \
              --instance-id "$INSTANCE_ID" \
              --query 'data."lifecycle-state"' --raw-output)
            echo "[$i] $STATE"
            [ "$STATE" = "RUNNING" ] && break
            sleep 15
          done
          PUBLIC_IP=$(oci compute instance list-vnics \
            --instance-id "$INSTANCE_ID" \
            --compartment-id "$OCI_TENANCY_OCID" \
            --query 'data[0]."public-ip"' --raw-output)
          echo "IP: $PUBLIC_IP"
          sleep 60
          printf '%s' "$OCI_SSH_PRIVATE_KEY" > /tmp/ankeet_key
          chmod 600 /tmp/ankeet_key
          SSH_OK=0
          for i in $(seq 1 10); do
            ssh -i /tmp/ankeet_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o BatchMode=yes \
              ubuntu@$PUBLIC_IP "echo SSH_OK" && SSH_OK=1 && break
            sleep 15
          done
          rm -f /tmp/ankeet_key
          if [ "$SSH_OK" = "1" ]; then
            echo "ANKEET INSTANCE READY | IP: $PUBLIC_IP | SSH: ssh -i oracle_friend ubuntu@$PUBLIC_IP"
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/leechwr/oracle-friend-arm/actions/workflows/auto-claim-a1.yml/disable"
          else
            echo "SSH failed. Will retry."
            exit 1
          fi
